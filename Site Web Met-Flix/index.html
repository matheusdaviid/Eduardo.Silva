<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Met-Flix</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap');
        @import url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css');

        body {
            background-color: #121212;
            color: #1DB954;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: #191414;
            border-bottom: 2px solid #1DB954;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #1DB954;
        }

        .search-bar-container {
            display: flex;
            align-items: center;
            background-color: #191414;
            padding: 10px;
            border-radius: 25px;
            flex-grow: 1;
            margin: 0 20px;
        }

        .search-bar {
            width: 100%;
            display: flex;
            align-items: center;
            background-color: #1DB954;
            border-radius: 25px;
            padding: 5px 15px;
        }

        .search-bar input {
            width: 100%;
            border: none;
            background: none;
            padding: 10px;
            color: #121212;
            font-size: 16px;
            outline: none;
            font-family: 'Poppins', sans-serif;
        }

        .search-bar i {
            color: #121212;
            font-size: 18px;
            margin-right: 10px;
        }

        .user-icons {
            display: flex;
            align-items: center;
        }

        .user-icons i {
            color: #1DB954;
            font-size: 20px;
            margin-left: 20px;
            cursor: pointer;
        }

        .menu {
            position: fixed;
            left: 0;
            top: 100px; /* Ajuste para não sobrepor a logo e a barra de pesquisa */
            width: 250px;
            height: 100%;
            background-color: #191414;
            padding-top: 20px;
            border-right: 2px solid #1DB954;
            z-index: 999;
        }

        .menu a {
            display: block;
            color: #1DB954;
            padding: 16px;
            text-decoration: none;
            font-size: 18px;
            font-family: 'Poppins', sans-serif;
        }

        .menu a:hover {
            background-color: #1DB954;
            color: #121212;
        }

        main {
            flex: 1;
            padding: 20px;
            margin-left: 250px;
            margin-top: 120px; /* Ajuste para compensar a altura da logo e da barra de pesquisa */
        }

        .video-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
        }

        .video {
            margin: 15px;
            background-color: #191414;
            padding: 10px;
            border-radius: 8px;
            width: 45%;
        }

        .video iframe {
            width: 100%;
            height: 315px;
            border: none;
            border-radius: 8px;
        }

        footer {
            background-color: #191414;
            padding: 20px;
            text-align: center;
            color: #777;
            font-size: 14px;
            border-top: 2px solid #1DB954;
            margin-left: 250px;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">Met-Flix</div>
        <div class="search-bar-container">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Pesquisar...">
            </div>
        </div>
        <div class="user-icons">
            <i class="fas fa-bell"></i>
            <i class="fas fa-user-circle"></i> <!-- Ícone de perfil adicionado -->
        </div>
    </header>
    <div class="menu">
        <a href="#home">Início</a>
        <a href="#playlists">Playlists</a>
        <a href="#inscricoes">Inscrições</a>
        <a href="#historico">Histórico</a>
    </div>
    <main>
        <div class="video-container">
            <div class="video">
                <iframe src="https://www.youtube.com/embed/Km6h658ZVrc" allowfullscreen></iframe>
            </div>
            <div class="video">
                <iframe src="https://www.youtube.com/embed/aYhvCBrKmO0" allowfullscreen></iframe>
            </div>
            <div class="video">
                <iframe src="https://www.youtube.com/embed/QcEUqsBhwF8" allowfullscreen></iframe>
            </div>
            <div class="video">
                <iframe src="https://www.youtube.com/embed/HjZ4Wp85RJI" allowfullscreen></iframe>
            </div>
            <!-- O quinto vídeo foi removido -->
        </div>
    </main>
    <footer>
        &copy; 2024 Met-Flix. Todos os direitos reservados.<br>
        Projeto realizado por Matheus David como parte do curso da Alura.
    </footer>
</body>
</html>
